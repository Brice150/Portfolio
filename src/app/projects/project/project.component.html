<div class="project">
  <img
    [src]="imagePath + project().image"
    [alt]="project().name"
    class="image"
    loading="lazy"
    decoding="async"
  />
  <div class="title">
    <h2>{{ project().name }}</h2>
  </div>
  <div class="btn-wrapper">
    @if (project().video) {
      <button type="button" title="Consulter" (click)="viewMore()" class="btn">
        <i class="bx bxs-folder-open"></i>
        <span>Consulter</span>
      </button>
    } @else {
      <a [href]="project().link" target="_blank" title="Tester" class="btn">
        <i class="bx bx-play"></i>
        <span>Tester</span>
      </a>
    }
  </div>
</div>
